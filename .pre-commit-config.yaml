repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types: [python]
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        types: [python]
        pass_filenames: false
      - id: pdoc-check
        name: pdoc-check
        entry: uv run pdoc --docformat google --output-dir /tmp/pystruct3d-docs-check pystruct3d
        language: system
        pass_filenames: false
        types: [python]
